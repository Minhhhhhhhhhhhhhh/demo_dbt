name: dbt CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  dbt-build:
    runs-on: ubuntu-latest
    
    steps:
      - name: checkout repo
        uses: actions/checkout@v4
      
      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dbt (PostgreSQL adapter)
        run: |
          python -m pip install dbt-postgres
      
      - name: Run dbt build
        run: |
          dbt --version
          dbt debug || true
          dbt build
        working-directory: .

      - name: Upload dbt artifacts (logs, Target, Run results)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dbt-artifacts
          path: |
            demo_dag_pg/target/
            demo_dag_pg/logs/
          retention-days: 90